version: '3.8'

services:
  db:
    image: postgres:15
    container_name: matie_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Sinhnam@2004
      POSTGRES_DB: admin_db
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d

  adminer:
    image: adminer
    container_name: matie_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
